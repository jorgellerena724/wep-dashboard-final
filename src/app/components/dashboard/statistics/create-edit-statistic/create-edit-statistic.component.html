<form [formGroup]="form" class="space-y-4 max-h-[70vh] pr-4 w-[420]">
  <div class="mb-4 grid grid-cols-1 gap-4">
    <app-text-field
      id="event_name"
      [label]="t('fields.event_name.title')"
      [control]="getFormControl('event_name')"
      placeholder="site_visits"
      [errorMessages]="{
        required: t('fields.event_name.required'),
        minlength: t('fields.event_name.minlength'),
      }"
    ></app-text-field>
  </div>
  <hr class="border-gray-500 my-1 border-opacity-10" />
  <app-text-field
    id="label"
    [label]="t('fields.label.title')"
    [control]="getFormControl('label')"
    [placeholder]="t('fields.label.placeholder')"
    [errorMessages]="{
      required: t('fields.label.required'),
      minlength: t('fields.label.minlength'),
    }"
  ></app-text-field>
  <hr class="border-gray-500 my-1 border-opacity-10" />
  <div class="field">
    <label
      class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
    >
      {{ t("fields.status.title") }}
    </label>
    <div class="flex items-center gap-3">
      <button
        type="button"
        (click)="toggleActive()"
        class="flex items-center gap-2 p-2 rounded-lg transition-colors hover:bg-gray-200 dark:hover:bg-gray-600"
      >
        <i
          class="pi text-lg"
          [class.pi-eye]="getFormControl('is_active').value"
          [class.pi-eye-slash]="!getFormControl('is_active').value"
          [class.text-green-500]="getFormControl('is_active').value"
          [class.text-gray-400]="!getFormControl('is_active').value"
        ></i>
        <span class="text-sm">
          {{
            getFormControl("is_active").value
              ? t("fields.status.active")
              : t("fields.status.inactive")
          }}
        </span>
      </button>
    </div>
  </div>
</form>
