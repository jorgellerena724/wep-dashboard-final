<div
  class="h-full items-center shadow-[0_4px_20px_rgba(0,0,0,0.5)] dark:shadow-[0_4px_20px_rgba(0,0,0,0.5)] rounded-lg"
>
  <div
    class="bg-[rgb(232,232,232)] dark:bg-[rgb(15,14,14)] dark:border-gray-200 rounded-lg sm:p-4 border-2 border-gray-600 shadow-[0_4px_20px_rgba(0,0,0,0.5)]"
  >
    <h1
      class="ml-2 sm:ml-0 text-2xl font-bold text-gray-700 dark:text-gray-300"
    >
      {{ "components.statistics.config.title" | transloco }}
    </h1>

    <!-- La tabla con signals -->
    <div class="mt-4">
      <app-table
        [data]="data()"
        [columns]="columns()"
        [loading]="loading()"
        [customTemplates]="customTemplates()"
        [headerActions]="headerActions()"
        [rowActions]="rowActions()"
        (refresh)="onRefresh()"
      >
      </app-table>
    </div>

    <ng-template #statusTemplate let-rowData let-field="field">
      <div class="flex justify-center items-center">
        <i
          class="pi text-lg"
          [class.pi-eye]="rowData.is_active"
          [class.pi-eye-slash]="!rowData.is_active"
          [class.text-green-500]="rowData.is_active"
          [class.text-gray-400]="!rowData.is_active"
        ></i>
      </div>
    </ng-template>
  </div>
</div>
